<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Scheduler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .safe-area-inset {
            padding-top: env(safe-area-inset-top);
        }

        .task-done {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col shadow-xl bg-white">

        <!-- Header -->
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg safe-area-inset">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="calendar"></i> 予定表
                </h1>
                <button id="installBtn"
                    class="hidden bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm transition-all">
                    アプリをインストール
                </button>
            </div>
            <div id="currentDate" class="text-indigo-100 text-sm font-medium"></div>
        </header>

        <!-- Stats Bar -->
        <div class="px-6 -mt-4">
            <div class="bg-white rounded-2xl p-4 shadow-md flex justify-around items-center border border-slate-100">
                <div class="text-center">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">残り</p>
                    <p id="pendingCount" class="text-xl font-bold text-indigo-600">0</p>
                </div>
                <div class="h-8 w-px bg-slate-100"></div>
                <div class="text-center">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">完了</p>
                    <p id="completedCount" class="text-xl font-bold text-emerald-500">0</p>
                </div>
            </div>
        </div>

        <!-- Task List -->
        <main class="flex-grow p-6 overflow-y-auto">
            <div id="taskList" class="space-y-3">
                <!-- Tasks will be injected here -->
                <div id="emptyState" class="text-center py-10 text-slate-400">
                    <i data-lucide="inbox" class="mx-auto mb-2 opacity-20" size="48"></i>
                    <p>予定がありません</p>
                </div>
            </div>
        </main>

        <!-- Input Area (Fixed at bottom) -->
        <footer class="p-6 bg-slate-50 border-t border-slate-100">
            <div class="flex gap-2">
                <input type="text" id="taskInput" placeholder="新しい予定を入力..."
                    class="flex-grow px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button id="addBtn"
                    class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-md shadow-indigo-200">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- PWA Infrastructure -->
    <script>
        // 1. Web App Manifest dynamic generation
        const manifest = {
            "name": "PWA Scheduler Sample",
            "short_name": "予定表",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#4f46e5",
            "icons": [
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/591/591576.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        // 2. Service Worker Registration (via Data URI for single file demo)
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'scheduler-v1';
                const assets = [
                    '/',
                    'https://cdn.tailwindcss.com',
                    'https://unpkg.com/lucide@latest'
                ];

                self.addEventListener('install', (event) => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(assets))
                    );
                });

                self.addEventListener('fetch', (event) => {
                    event.respondWith(
                        caches.match(event.request).then(response => {
                            return response || fetch(event.request);
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(swBlob);

            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl).then(reg => {
                    console.log('SW Registered');
                }).catch(err => console.log('SW Registration failed', err));
            });
        }
    </script>

    <!-- App Logic -->
    <script>
        // State Management
        let tasks = JSON.parse(localStorage.getItem('pwa_tasks')) || [];

        // DOM Elements
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const pendingCount = document.getElementById('pendingCount');
        const completedCount = document.getElementById('completedCount');
        const currentDateEl = document.getElementById('currentDate');
        const installBtn = document.getElementById('installBtn');

        // Initial Setup
        window.onload = () => {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            currentDateEl.innerText = now.toLocaleDateString('ja-JP', options);
            renderTasks();
            lucide.createIcons();
        };

        // Render function
        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div id="emptyState" class="text-center py-10 text-slate-400">
                        <i data-lucide="inbox" class="mx-auto mb-2 opacity-20" size="48"></i>
                        <p>予定がありません</p>
                    </div>
                `;
            } else {
                tasks.forEach((task, index) => {
                    const taskEl = document.createElement('div');
                    taskEl.className = 'flex items-center gap-3 p-4 bg-white border border-slate-100 rounded-2xl shadow-sm hover:border-indigo-100 transition-all';
                    taskEl.innerHTML = `
                        <button onclick="toggleTask(${index})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${task.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}">
                            ${task.done ? '<i data-lucide="check" size="14"></i>' : ''}
                        </button>
                        <span class="flex-grow font-medium ${task.done ? 'task-done' : ''}">${task.text}</span>
                        <button onclick="deleteTask(${index})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    `;
                    taskList.appendChild(taskEl);
                });
            }

            // Update Stats
            pendingCount.innerText = tasks.filter(t => !t.done).length;
            completedCount.innerText = tasks.filter(t => t.done).length;

            // Save & Re-init icons
            localStorage.setItem('pwa_tasks', JSON.stringify(tasks));
            lucide.createIcons();
        }

        // Actions
        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ text, done: false });
                taskInput.value = '';
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        // Event Listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // PWA Install Prompt handling
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>

</html>
