<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS-PERT Analyzer - Standalone Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [input, setInput] = useState(
                "ID | タスク名 | 開始日 | 終了日 | 期間(日) | 先行ID\n" +
                "1 | 出欠確認 | 1/8 | 2/6 | 30 | \n" +
                "2 | 議題確認 | 1/8 | 2/6 | 30 | \n" +
                "3 | 議題収集 | 2/9 | 2/13 | 5 | 1,2\n" +
                "4 | 資料作成 | 2/16 | 2/20 | 5 | 3\n" +
                "5 | 資料配布 | 2/23 | 2/23 | 1 | 4\n" +
                "6 | 進行次第作成 | 2/23 | 2/26 | 4 | 4\n" +
                "7 | お茶購入 | 2/23 | 2/26 | 4 | 1\n" +
                "8 | 幹事会当日 | 2/27 | 2/27 | 1 | 5,6,7"
            );

            const [error, setError] = useState(null);
            const [isExporting, setIsExporting] = useState(false);
            const [scale, setScale] = useState(0.8);
            const [copyStatus, setCopyStatus] = useState(null);
            const chartRef = useRef(null);

            // 日付解析
            const parseLocalDate = (dateStr) => {
                if (!dateStr) return null;
                const currentYear = new Date().getFullYear();
                const cleanStr = dateStr.replace(/\s/g, '').replace(/\//g, '-');
                const parts = cleanStr.split('-');
                let d;
                if (parts.length === 2) d = new Date(currentYear, parseInt(parts[0]) - 1, parseInt(parts[1]));
                else if (parts.length === 3) {
                    const year = parts[0].length === 2 ? 2000 + parseInt(parts[0]) : parseInt(parts[0]);
                    d = new Date(year, parseInt(parts[1]) - 1, parseInt(parts[2]));
                } else return null;
                d.setHours(0, 0, 0, 0);
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDate = (dateObj) => {
                if (!dateObj || isNaN(dateObj.getTime())) return "----/--/--";
                return `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}`;
            };

            const getTargetDate = (baseDateStr, daysOffset) => {
                const date = parseLocalDate(baseDateStr);
                if (!date) return new Date();
                date.setDate(date.getDate() + daysOffset);
                return date;
            };

            // PERT分析 & ロジック
            const analysisResult = useMemo(() => {
                try {
                    const lines = input.split('\n').filter(l => {
                        const t = l.trim();
                        return t && !t.startsWith('#') && !(t.includes("ID") && (t.includes("タスク名") || t.includes("タスク")));
                    });
                    
                    const seenIds = new Set();
                    const rawData = [];
                    let allDates = [];

                    for (const line of lines) {
                        const parts = line.split('|').map(s => s?.trim());
                        const [id, rawName, startStr, endStr, durStr, predStr] = parts;
                        if (!id || seenIds.has(id)) continue;
                        seenIds.add(id);
                        const dStart = parseLocalDate(startStr);
                        const dEnd = parseLocalDate(endStr);
                        if (dStart) allDates.push(dStart.getTime());
                        if (dEnd) allDates.push(dEnd.getTime());
                        rawData.push({ id, rawName, dStart, dEnd, durStr, predStr });
                    }

                    const minTimestamp = allDates.length > 0 ? Math.min(...allDates) : new Date().setHours(0,0,0,0);
                    const baseDateObj = new Date(minTimestamp);
                    const baseDateStr = formatDate(baseDateObj);

                    let tasks = rawData.map(item => {
                        const { id, rawName, dStart, dEnd, predStr } = item;
                        const hierarchyParts = rawName.split(/[／/]/).map(p => p.trim());
                        const cleanName = (hierarchyParts.length > 1 ? hierarchyParts[hierarchyParts.length - 1] : rawName).replace(/^[■●→]\s*/, "");
                        let duration = 0;
                        let plannedES = 0; 
                        if (dStart && dEnd) {
                            duration = Math.max(1, Math.round((dEnd.getTime() - dStart.getTime()) / 86400000) + 1);
                            plannedES = Math.round((dStart.getTime() - minTimestamp) / 86400000);
                        } else duration = parseInt(item.durStr) || 1;

                        return {
                            id, name: cleanName, parentContext: hierarchyParts.length > 1 ? hierarchyParts.slice(0, -1).join(' > ') : "",
                            category: hierarchyParts.length >= 3 ? "small" : hierarchyParts.length === 2 ? "medium" : rawName.startsWith("■") ? "large" : "normal",
                            duration, plannedES, plannedEF: plannedES + duration,
                            predecessors: predStr ? [...new Set(predStr.split(/[,,、]/).map(p => p.trim()).filter(p => p))] : [],
                            logicalES: 0, logicalEF: 0, ls: 0, lf: 0, slack: 0, level: 0
                        };
                    });

                    if (tasks.length === 0) return null;

                    const taskMap = new Map(tasks.map(t => [t.id, t]));

                    // Logical Pass
                    let changed = true;
                    while (changed) {
                        changed = false;
                        tasks.forEach(t => {
                            let es_log = 0; 
                            if (t.predecessors.length > 0) {
                                const preds = t.predecessors.map(pId => taskMap.get(pId)).filter(Boolean);
                                if (preds.length > 0) es_log = Math.max(...preds.map(p => p.logicalEF));
                            }
                            if (t.logicalES !== es_log) { t.logicalES = es_log; changed = true; }
                            const level = t.predecessors.length > 0 ? Math.max(...t.predecessors.map(pId => (taskMap.get(pId)?.level || 0))) + 1 : 0;
                            if (t.level !== level) { t.level = level; changed = true; }
                            t.logicalEF = t.logicalES + t.duration;
                        });
                    }

                    // Backward Pass from project end
                    const actualProjectFinish = Math.max(...tasks.map(t => t.plannedEF), 0);
                    tasks.forEach(t => { t.lf = actualProjectFinish; });
                    for (let i = 0; i < tasks.length; i++) {
                        tasks.forEach(t => {
                            const successors = tasks.filter(st => st.predecessors.includes(t.id));
                            if (successors.length > 0) t.lf = Math.min(...successors.map(st => st.ls));
                            t.ls = t.lf - t.duration;
                        });
                    }

                    // Opportunity Slack calculation: (Latest Finish - Logical Earliest Finish)
                    tasks.forEach(t => {
                        t.slack = Math.max(0, t.lf - t.logicalEF);
                    });

                    const minSlack = Math.min(...tasks.map(t => t.slack));
                    const criticalPathIds = tasks.filter(t => t.slack <= minSlack + 0.001).map(t => t.id);
                    const levels = Array.from({ length: Math.max(...tasks.map(t => t.level), 0) + 1 }, (_, i) => tasks.filter(t => t.level === i));

                    setError(null);
                    return { tasks, taskMap, projectMeta: { duration: actualProjectFinish, criticalPath: criticalPathIds, levels, baseDateStr, minSlack, width: levels.length * 400 + 200, height: Math.max(...levels.map(l => l.length)) * 280 + 200 } };
                } catch (err) { setError(err.message); return null; }
            }, [input]);

            const result = analysisResult || { tasks: [], taskMap: new Map(), projectMeta: { duration: 0, criticalPath: [], levels: [], width: 1200, height: 800, baseDateStr: "", minSlack: 0 } };

            const nodePositions = useMemo(() => {
                const positions = {};
                result.projectMeta.levels.forEach((levelTasks, colIndex) => {
                    levelTasks.forEach((task, rowIndex) => {
                        positions[task.id] = { x: colIndex * 400 + 100, y: rowIndex * 280 + 120 };
                    });
                });
                return positions;
            }, [result.projectMeta.levels]);

            const handleExportPdf = async () => {
                if (!chartRef.current) return;
                setIsExporting(true);
                try {
                    const width = result.projectMeta.width;
                    const height = result.projectMeta.height;
                    const dataUrl = await htmlToImage.toPng(chartRef.current, { backgroundColor: '#ffffff', width, height, pixelRatio: 2.0, style: { transform: 'none', boxShadow: 'none', borderRadius: '0', margin: '0', padding: '20px' } });
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF(width > height ? 'l' : 'p', 'px', [width + 40, height + 40]);
                    pdf.addImage(dataUrl, 'PNG', 0, 0, width + 40, height + 40, undefined, 'FAST');
                    pdf.save('wbs_pert_diagram.pdf');
                    setCopyStatus('success');
                    setTimeout(() => setCopyStatus(null), 2000);
                } catch (err) { console.error(err); } finally { setIsExporting(false); }
            };

            return (
                <div className="min-h-screen flex flex-col overflow-hidden">
                    <header className="px-6 py-4 border-b border-slate-200 bg-white flex flex-col lg:flex-row items-center justify-between gap-4 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-rose-600 p-2 rounded-xl shadow-lg shadow-rose-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight">WBS-PERT Analyzer</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Structural Critical Path Engine</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap items-center gap-4">
                            <div className="bg-slate-50 px-4 py-2 rounded-2xl border border-slate-200 flex flex-col items-center min-w-[120px]">
                                <span className="text-[8px] font-black text-slate-400 uppercase">Project Start</span>
                                <span className="text-xs font-black">{result.projectMeta.baseDateStr}</span>
                            </div>
                            <div className="bg-rose-50 px-4 py-2 rounded-2xl border border-rose-100 flex flex-col items-center min-w-[120px]">
                                <span className="text-[8px] font-black text-rose-400 uppercase">Project Finish</span>
                                <span className="text-xs font-black text-rose-700">{formatDate(getTargetDate(result.projectMeta.baseDateStr, result.projectMeta.duration - 1))}</span>
                            </div>
                            <button onClick={handleExportPdf} disabled={isExporting} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-black transition-all active:scale-95 disabled:opacity-50">
                                {isExporting ? <span className="animate-spin">◌</span> : <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>}
                                PDF EXPORT
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-0 overflow-hidden">
                        {/* Sidebar: Data Input (2/12 ratio) */}
                        <div className="lg:col-span-2 border-r border-slate-200 bg-white flex flex-col overflow-hidden">
                            <div className="p-4 flex items-center justify-between border-b border-slate-50">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg> WBS Input
                                </h2>
                            </div>
                            <textarea 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)} 
                                className="flex-1 w-full p-4 font-mono text-[10px] bg-white outline-none resize-none leading-relaxed custom-scrollbar" 
                                spellCheck="false" 
                            />
                            <div className="p-4 bg-slate-50 border-t border-slate-100">
                                <div className="text-[9px] text-slate-500 font-bold leading-relaxed">
                                    <p>■大項目 / ●中項目 / →小項目</p>
                                    <p className="mt-1 text-rose-500 italic">※最長経路は自動で赤くハイライトされます。</p>
                                </div>
                            </div>
                        </div>

                        {/* Diagram Area (10/12 ratio) */}
                        <div className="lg:col-span-10 relative bg-slate-100 flex flex-col overflow-hidden">
                            <div className="absolute top-6 left-6 z-20 flex items-center gap-1 bg-white/90 backdrop-blur border border-slate-200 rounded-full px-2 py-1 shadow-sm">
                                <button onClick={() => setScale(Math.max(0.1, scale - 0.1))} className="p-1 hover:bg-slate-100 rounded-full text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                                <span className="text-[10px] font-black w-10 text-center tabular-nums">{Math.round(scale * 100)}%</span>
                                <button onClick={() => setScale(Math.min(2.0, scale + 0.1))} className="p-1 hover:bg-slate-100 rounded-full text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                                <div className="w-px h-3 bg-slate-200 mx-1"></div>
                                <button onClick={() => setScale(0.8)} className="p-1 hover:bg-slate-100 rounded-full text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
                            </div>

                            <div className="flex-1 overflow-auto p-8 custom-scrollbar">
                                {error ? (
                                    <div className="h-full flex items-center justify-center text-rose-500 font-bold">{error}</div>
                                ) : (
                                    <div ref={chartRef} className="relative bg-white transition-transform duration-200 origin-top-left" style={{ width: `${result.projectMeta.width}px`, height: `${result.projectMeta.height}px`, transform: `scale(${scale})`, borderRadius: '24px' }}>
                                        <svg className="absolute inset-0 pointer-events-none" width="100%" height="100%">
                                            <defs>
                                                <marker id="arrow-normal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" /></marker>
                                                <marker id="arrow-critical" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e" /></marker>
                                            </defs>
                                            {result.tasks.map(task => task.predecessors.map(pId => {
                                                const from = nodePositions[pId]; const to = nodePositions[task.id];
                                                if (!from || !to) return null;
                                                const isCriticalEdge = result.projectMeta.criticalPath.includes(task.id) && result.projectMeta.criticalPath.includes(pId);
                                                return (
                                                    <g key={`${pId}-${task.id}`}>
                                                        {isCriticalEdge && <path d={`M ${from.x + 260} ${from.y + 100} C ${from.x + 330} ${from.y + 100}, ${to.x - 70} ${to.y + 100}, ${to.x} ${to.y + 100}`} fill="none" stroke="#fecdd3" strokeWidth={8} opacity="0.5" />}
                                                        <path d={`M ${from.x + 260} ${from.y + 100} C ${from.x + 330} ${from.y + 100}, ${to.x - 70} ${to.y + 100}, ${to.x} ${to.y + 100}`} fill="none" stroke={isCriticalEdge ? "#f43f5e" : "#cbd5e1"} strokeWidth={isCriticalEdge ? 2.5 : 1.2} strokeDasharray={isCriticalEdge ? "0" : "5,5"} markerEnd={isCriticalEdge ? "url(#arrow-critical)" : "url(#arrow-normal)"} />
                                                    </g>
                                                );
                                            }))}
                                        </svg>
                                        <div className="relative z-10">{result.tasks.map(task => (
                                            <TaskNode key={task.id} task={task} pos={nodePositions[task.id]} isCritical={result.projectMeta.criticalPath.includes(task.id)} baseDateStr={result.projectMeta.baseDateStr} formatDate={formatDate} getTargetDate={getTargetDate} minSlack={result.projectMeta.minSlack} />
                                        ))}</div>
                                    </div>
                                )}
                            </div>
                            
                            <footer className="p-3 bg-white border-t border-slate-200 flex justify-center gap-8 shrink-0 shadow-inner">
                                <div className="flex items-center gap-2"><div className="w-4 h-0.5 bg-rose-500"></div><span className="text-[9px] font-black text-rose-600 uppercase tracking-widest">Critical Path</span></div>
                                <div className="flex items-center gap-2"><div className="w-4 h-0.5 bg-slate-300 border-b border-dashed border-slate-400"></div><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Normal Path</span></div>
                            </footer>
                        </div>
                    </main>
                </div>
            );
        };

        const TaskNode = ({ task, pos, isCritical, baseDateStr, formatDate, getTargetDate, minSlack }) => {
            if (!pos) return null;
            const styles = { large: "border-slate-800 border-l-[12px] border-l-slate-800", medium: "border-slate-400 border-l-[8px] border-l-blue-400", small: "border-slate-200 border-l-[4px] border-l-slate-300", normal: "border-slate-200 border-l-[4px] border-l-slate-200" };
            const esDate = getTargetDate(baseDateStr, task.plannedES);
            const efDate = getTargetDate(baseDateStr, task.plannedEF - 1);
            const lfDate = getTargetDate(baseDateStr, task.lf - 1);
            const displaySlack = Math.max(0, Math.round(task.slack - minSlack));

            return (
                <div className={`absolute w-[260px] rounded-2xl overflow-hidden border-2 transition-all bg-white ${styles[task.category] || styles.normal} ${isCritical ? 'ring-4 ring-rose-500/20 border-rose-500 shadow-xl' : ''}`} style={{ left: pos.x, top: pos.y }}>
                    <div className={`grid grid-cols-3 text-[9px] font-bold text-center border-b border-slate-50 bg-slate-50/30`}>
                        <div className="py-2 border-r border-slate-100 px-1"><span className="block text-[7px] text-slate-400 font-black opacity-70 uppercase">予定開始</span><span className="text-slate-700">{formatDate(esDate)}</span></div>
                        <div className={`py-2 border-r border-slate-100 px-1 ${isCritical ? 'text-rose-600' : 'text-indigo-600'}`}><span className="block text-[7px] text-slate-400 font-black opacity-70 uppercase tracking-tighter">期間</span><span className="font-black underline decoration-1">{task.duration}日</span></div>
                        <div className="py-2 text-slate-400 px-1"><span className="block text-[7px] text-slate-400 font-black opacity-70 uppercase">予定終了</span><span className="text-slate-700">{formatDate(efDate)}</span></div>
                    </div>
                    <div className="p-4 min-h-[90px] flex flex-col items-center justify-center text-center bg-white relative px-4">
                        {task.parentContext && <div className="absolute top-2 left-4 right-4 flex items-center gap-1 opacity-40 overflow-hidden whitespace-nowrap text-left text-[8px] font-bold uppercase"><span className="text-[10px]">📁</span>{task.parentContext}</div>}
                        {isCritical && <div className="absolute top-1 right-2 flex items-center gap-1 bg-rose-500 text-white px-2 py-0.5 rounded-full shadow-lg animate-pulse z-20"><span className="text-[10px]">⚠️</span><span className="text-[7px] font-black tracking-tighter uppercase">Primary</span></div>}
                        <h4 className={`text-[12px] font-black leading-tight max-w-full text-slate-800 mt-2`}>{task.name}</h4>
                    </div>
                    <div className={`grid grid-cols-3 text-[9px] font-bold text-center border-t border-slate-50 bg-slate-50/20`}>
                        <div className="py-2 border-r border-slate-100 text-slate-400 px-1">
                            <span className="block text-[7px] font-black opacity-70 uppercase tracking-tighter">余裕</span>
                            <span className={`text-sm ${isCritical ? 'text-rose-600 font-black' : 'font-bold text-slate-500'}`}>{displaySlack}日</span>
                        </div>
                        <div className="py-2 border-r border-slate-100 text-slate-400 px-1 col-span-2 bg-rose-50/30">
                            <div className="flex flex-col items-center justify-center">
                                <span className="block text-[7px] font-black opacity-90 uppercase tracking-tighter text-rose-600">最遅完了日（期限）</span>
                                <span className="tabular-nums font-black text-slate-800 text-[10px]">{formatDate(lfDate)}</span>
                            </div>
                        </div>
                    </div>
                    <div className={`absolute top-0 left-0 px-2 py-1 rounded-br-xl text-[8px] font-black border-r border-b border-inherit bg-slate-800 text-white shadow-sm`}>#{task.id}</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
